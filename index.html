<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noorah Ashmeel Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF7F0;
    --ink:#15151A;
    --ink-soft:#5B5A63;
    --coral:#FF4D3D;
    --cobalt:#3B5BFF;
    --yellow:#FFD23F;
    --line:#E7E1D3;
    --card:#FFFFFF;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:0 28px;}

  /* ===== HEADER ===== */
  header{
    padding:56px 0 28px;
    border-bottom:3px solid var(--ink);
    position:relative;
  }
  .name-row{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap;}
  .name-edit{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:clamp(40px,7vw,76px);
    line-height:0.95;
    margin:0;
    border:none;
    background:transparent;
    color:var(--ink);
    outline:none;
    width:100%;
    padding:2px 0;
  }
  .role-edit{
    font-family:'JetBrains Mono',monospace;
    font-size:14px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--ink);
    background:var(--yellow);
    padding:6px 12px;
    border:2px solid var(--ink);
    border-radius:3px;
    margin-top:14px;
    display:inline-block;
    outline:none;
  }
  .header-meta{
    margin-top:18px;
    display:flex;
    gap:18px;
    flex-wrap:wrap;
  }
  .meta-field{
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    color:var(--ink-soft);
    border:none;
    background:transparent;
    outline:none;
    border-bottom:1px dashed var(--line);
    padding:3px 0;
    min-width:140px;
  }
  .meta-field::placeholder{color:#B7B2A2;}

  .bio-edit{
    font-family:'Inter',sans-serif;
    font-size:18px;
    line-height:1.55;
    color:var(--ink);
    max-width:680px;
    margin:24px 0 0;
    border:none;
    background:transparent;
    outline:none;
    resize:none;
    width:100%;
    padding:0;
  }

  /* ===== TAB NAV (sticky-note style) ===== */
  nav.tabs{
    display:flex;
    gap:10px;
    padding:22px 0 0;
    flex-wrap:wrap;
  }
  .tab-btn{
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:14px;
    padding:9px 18px 11px;
    border:2px solid var(--ink);
    border-radius:8px 8px 2px 2px;
    background:var(--card);
    cursor:pointer;
    transform:rotate(-1deg);
    transition:transform .15s ease;
  }
  .tab-btn:nth-child(2){transform:rotate(1deg);}
  .tab-btn:nth-child(3){transform:rotate(-0.5deg);}
  .tab-btn:hover{transform:rotate(0deg) translateY(-2px);}
  .tab-btn.active{background:var(--ink);color:var(--paper);}

  section{padding:48px 0;}
  .section-label{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:6px;
  }
  h2.section-title{
    font-family:'Space Grotesk',sans-serif;
    font-size:clamp(26px,4vw,38px);
    margin:0 0 28px;
  }

  /* ===== PROJECT GRID / CORKBOARD ===== */
  .board{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:22px;
  }
  @media (max-width:760px){ .board{grid-template-columns:1fr;} }

  .pin-card{
    border:3px solid var(--ink);
    border-radius:14px;
    background:var(--card);
    overflow:hidden;
    position:relative;
    display:flex;
    flex-direction:column;
  }
  .pin-card .accent-tag{
    position:absolute;
    top:14px;
    left:14px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    padding:4px 9px;
    border:2px solid var(--ink);
    border-radius:20px;
    background:var(--paper);
    z-index:3;
  }

  .drop-zone{
    aspect-ratio:16/10;
    width:100%;
    border-bottom:3px solid var(--ink);
    background:
      repeating-linear-gradient(135deg, transparent 0 14px, rgba(0,0,0,0.03) 14px 16px);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    position:relative;
    flex-shrink:0;
    transition:background .15s ease;
  }
  .drop-zone.drag-over{
    background:var(--yellow);
  }
  .drop-zone img{
    width:100%;height:100%;object-fit:cover;display:block;
  }
  .drop-zone .dz-prompt{
    text-align:center;
    padding:20px;
    pointer-events:none;
  }
  .dz-prompt .dz-icon{
    font-size:30px;
    display:block;
    margin-bottom:6px;
  }
  .dz-prompt span{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:0.05em;
  }
  .dz-remove{
    position:absolute;top:10px;right:10px;
    width:30px;height:30px;
    border-radius:50%;
    border:2px solid var(--ink);
    background:var(--paper);
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    cursor:pointer;
    z-index:4;
    line-height:1;
  }
  .more-thumbs{
    display:flex;
    gap:6px;
    padding:10px 14px;
    border-bottom:3px solid var(--ink);
    overflow-x:auto;
    flex-shrink:0;
  }
  .more-thumbs img{
    width:54px;height:40px;object-fit:cover;border-radius:5px;border:2px solid var(--ink);flex-shrink:0;
  }
  .thumb-add{
    width:54px;height:40px;border-radius:5px;border:2px dashed var(--ink-soft);
    display:flex;align-items:center;justify-content:center;
    font-size:18px;color:var(--ink-soft);cursor:pointer;flex-shrink:0;background:none;
  }

  .pin-body{padding:18px 18px 20px;display:flex;flex-direction:column;gap:10px;flex:1;}
  .title-input{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:21px;
    border:none;background:transparent;outline:none;color:var(--ink);
    padding:0;width:100%;
  }
  .tagline-input{
    font-family:'Inter',sans-serif;
    font-size:14px;
    color:var(--ink-soft);
    border:none;background:transparent;outline:none;width:100%;padding:0;
  }
  .case-fields{display:flex;flex-direction:column;gap:12px;margin-top:6px;}
  .case-field label{
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--ink-soft);
    display:block;
    margin-bottom:4px;
  }
  .case-field textarea{
    font-family:'Inter',sans-serif;
    font-size:14px;
    line-height:1.5;
    width:100%;
    border:none;
    border-left:3px solid var(--line);
    background:transparent;
    outline:none;
    resize:vertical;
    padding:2px 0 2px 10px;
    min-height:48px;
    color:var(--ink);
  }
  .case-field textarea:focus{border-left-color:var(--ink);}
  .tags-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
  .tag-pill{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    padding:4px 10px;
    border:1.5px solid var(--ink);
    border-radius:20px;
    background:var(--paper);
  }
  .tag-input{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    border:1.5px dashed var(--ink-soft);
    border-radius:20px;
    padding:4px 10px;
    background:transparent;
    outline:none;
    width:90px;
  }

  .delete-project{
    align-self:flex-start;
    margin-top:8px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--coral);
    background:none;
    border:none;
    cursor:pointer;
    text-decoration:underline;
    padding:0;
  }

  .add-project-card{
    border:3px dashed var(--ink-soft);
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:240px;
    cursor:pointer;
    background:transparent;
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:16px;
    color:var(--ink-soft);
  }
  .add-project-card:hover{border-color:var(--ink);color:var(--ink);}

  /* ===== SKILLS / TOOLS ===== */
  .skills-wrap{display:flex;flex-direction:column;gap:18px;}
  .skill-row{display:flex;gap:14px;flex-wrap:wrap;}
  .skill-pill{
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    padding:8px 14px;
    border:2px solid var(--ink);
    border-radius:8px;
    background:var(--card);
    display:flex;
    align-items:center;
    gap:8px;
  }
  .skill-pill button{
    border:none;background:none;cursor:pointer;color:var(--ink-soft);font-size:13px;line-height:1;padding:0;
  }
  .add-skill-input{
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    padding:8px 14px;
    border:2px dashed var(--ink-soft);
    border-radius:8px;
    background:transparent;
    outline:none;
    width:130px;
  }

  /* ===== CONTACT ===== */
  .contact-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  @media (max-width:760px){.contact-grid{grid-template-columns:1fr;}}
  .contact-card{
    border:2px solid var(--ink);
    border-radius:10px;
    padding:16px;
    background:var(--card);
  }
  .contact-card label{
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px;
    text-transform:uppercase;
    color:var(--ink-soft);
    display:block;
    margin-bottom:6px;
  }
  .contact-card input{
    font-family:'Inter',sans-serif;
    font-size:15px;
    border:none;
    background:transparent;
    outline:none;
    width:100%;
    color:var(--ink);
  }

  footer{
    padding:30px 0 60px;
    text-align:center;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
  }

  .save-pill{
    position:fixed;
    bottom:22px;
    right:22px;
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    background:var(--ink);
    color:var(--paper);
    padding:9px 16px;
    border-radius:20px;
    opacity:0;
    transition:opacity .3s ease;
    z-index:50;
    pointer-events:none;
  }
  .save-pill.show{opacity:1;}

  input::placeholder, textarea::placeholder{color:#B7B2A2;}
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="name-row">
      <input id="name" class="name-edit" placeholder="Your Name" />
    </div>
    <input id="role" class="role-edit" placeholder="UI/UX Designer" />
    <div class="header-meta">
      <input id="location" class="meta-field" placeholder="📍 City, Country" />
      <input id="email" class="meta-field" placeholder="✉ you@email.com" />
      <input id="links" class="meta-field" placeholder="🔗 dribbble / linkedin" style="min-width:220px;" />
    </div>
    <textarea id="bio" class="bio-edit" rows="2" placeholder="A short bio — what you design, who you design for, and what you care about."></textarea>

    <nav class="tabs">
      <button class="tab-btn active" data-target="work">Work</button>
      <button class="tab-btn" data-target="skills">Skills</button>
      <button class="tab-btn" data-target="contact">Contact</button>
    </nav>
  </header>

  <section id="work">
    <div class="section-label">Selected Work</div>
    <h2 class="section-title">Case Studies</h2>
    <div class="board" id="board"></div>
  </section>

  <section id="skills" style="display:none;">
    <div class="section-label">Capabilities</div>
    <h2 class="section-title">Skills &amp; Tools</h2>
    <div class="skills-wrap">
      <div>
        <div class="section-label" style="margin-bottom:10px;">Design skills</div>
        <div class="skill-row" id="skillsRow"></div>
      </div>
      <div>
        <div class="section-label" style="margin-bottom:10px;">Tools</div>
        <div class="skill-row" id="toolsRow"></div>
      </div>
    </div>
  </section>

  <section id="contact" style="display:none;">
    <div class="section-label">Get In Touch</div>
    <h2 class="section-title">Contact</h2>
    <div class="contact-grid">
      <div class="contact-card">
        <label>Email</label>
        <input id="contactEmail" placeholder="you@email.com" />
      </div>
      <div class="contact-card">
        <label>Phone (optional)</label>
        <input id="contactPhone" placeholder="+1 234 567 8900" />
      </div>
      <div class="contact-card">
        <label>Portfolio links</label>
        <input id="contactLinks" placeholder="dribbble.com/you" />
      </div>
    </div>
  </section>

  <footer>
  Built with care — images are linked from the images folder and ready for GitHub Pages.<br><br>
  <button id="downloadHtml" class="tab-btn" type="button">Download filled HTML</button>
  <button id="resetData" class="tab-btn" type="button">Reset saved data</button>
</footer>
</div>

<div class="save-pill" id="savePill">Saved</div>

<script>
const ACCENTS = ['coral','cobalt','yellow'];
const ACCENT_HEX = {coral:'#FF4D3D', cobalt:'#3B5BFF', yellow:'#FFD23F'};

let state = {
  name:'Noorah Ashmeel',
  role:'UI/UX Designer',
  location:'Al Khobar, Saudi Arabia',
  email:'nourashmeel@gmail.com',
  links:'linkedin.com/in/noorah-ashmeel-408548134',
  bio:'UI/UX Designer with an IT background, passionate about creating clear, user-centered digital experiences. I focus on research, flows, wireframes, prototyping, and AI-assisted design to simplify complex products.',
  contactEmail:'nourashmeel@gmail.com',
  contactPhone:'',
  contactLinks:'linkedin.com/in/noorah-ashmeel-408548134',
  skills:['User research','User flows','Wireframing','Prototyping','Usability testing','Information architecture','Responsive design','Accessibility','Requirements gathering','AI-assisted design'],
  tools:['Figma','FigJam','Adobe Illustrator','Adobe Photoshop','Notion','Claude','HTML','CSS'],
  projects:[
    {
      id:'p_darb', accent:'coral', cover:'images/darb.png', extraImages:[],
      title:'Darb LMS',
      tagline:'Designing an LMS for course enrollment and learning collaboration.',
      problem:'The platform was designed from scratch to support trainees, instructors, and administrators in one structured learning experience. The key challenge was simplifying course discovery, enrollment, assignments, projects, and progress tracking across different user roles.',
      process:'We mapped the main user journeys, defined role-based flows, created wireframes, and planned key LMS features such as course browsing, group joining, assignments, project workspaces, dashboards, and admin management.',
      solution:'The final concept provides a scalable LMS experience where users can discover and enroll in courses, access learning materials, collaborate in groups, create meetings through Google Meet, track progress, and manage content efficiently.',
      tags:['LMS','UX Research','User Flow','Wireframes','Figma']
    },
    {
      id:'p_handmade', accent:'cobalt', cover:'images/handmade-harmony.png', extraImages:[],
      title:'Handmade Harmony',
      tagline:'Designing an e-commerce experience for handmade pottery products.',
      problem:'Users needed a simple and warm shopping experience that made handmade products easy to browse, understand, and purchase while reflecting the brand’s handcrafted identity.',
      process:'I researched similar handmade marketplaces, defined the product categories, built the user journey from home page to checkout, created wireframes, and developed a visual direction that feels calm, crafted, and trustworthy.',
      solution:'The result is a desktop-first e-commerce concept with clear categories, product pages, brand storytelling, and a smooth checkout flow that supports product discovery and purchase confidence.',
      tags:['E-commerce','Branding','UX/UI','Figma','Desktop']
    },
    {
      id:'p_blissful', accent:'yellow', cover:'images/blissed-heaven.png', extraImages:[],
      title:'Blissed Heaven Restaurant',
      tagline:'Improving the online ordering experience for a restaurant website.',
      problem:'Restaurant customers need to browse menu items quickly, understand options clearly, and complete ordering without unnecessary friction or confusion.',
      process:'I analyzed the ordering flow, created wireframes, improved content hierarchy, and tested the experience to identify where users might hesitate or drop off.',
      solution:'The redesigned flow makes menu browsing, item selection, and ordering more direct and user-friendly, helping customers complete their order with fewer steps.',
      tags:['Restaurant','User Flow','Wireframes','Usability','Figma']
    }
  ]
};

function uid(){ return 'p_'+Math.random().toString(36).slice(2,9); }

function defaultProject(){
  return {
    id: uid(),
    accent: ACCENTS[state.projects.length % ACCENTS.length],
    cover: null,
    extraImages: [],
    title:'',
    tagline:'',
    problem:'',
    process:'',
    solution:'',
    tags:[]
  };
}

let saveTimeout;
function scheduleSave(){
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(saveState, 400);
}

function saveState(){
  try{
    localStorage.setItem('noorah-portfolio-data', JSON.stringify(state));
    const pill = document.getElementById('savePill');
    pill.textContent = 'Saved';
    pill.classList.add('show');
    setTimeout(()=>pill.classList.remove('show'), 1200);
  }catch(e){
    console.error('Save failed', e);
    const pill = document.getElementById('savePill');
    pill.textContent = 'Storage full — try smaller images';
    pill.classList.add('show');
    setTimeout(()=>pill.classList.remove('show'), 2200);
  }
}

function loadState(){
  try{
    const saved = null; // GitHub-ready static version
    if(saved){
      const loaded = JSON.parse(saved);
      state = Object.assign(state, loaded);
    }
  }catch(e){
    console.warn('No saved data found yet');
  }
  if(state.projects.length === 0){
    state.projects.push(defaultProject());
    state.projects.push(defaultProject());
  }
  hydrateHeader();
  renderBoard();
  renderSkillRow('skillsRow','skills');
  renderSkillRow('toolsRow','tools');
  hydrateContact();
}

function hydrateHeader(){
  document.getElementById('name').value = state.name;
  document.getElementById('role').value = state.role;
  document.getElementById('location').value = state.location;
  document.getElementById('email').value = state.email;
  document.getElementById('links').value = state.links;
  document.getElementById('bio').value = state.bio;
}

function hydrateContact(){
  document.getElementById('contactEmail').value = state.contactEmail;
  document.getElementById('contactPhone').value = state.contactPhone;
  document.getElementById('contactLinks').value = state.contactLinks;
}

['name','role','location','email','links','bio'].forEach(id=>{
  document.getElementById(id).addEventListener('input', e=>{
    state[id] = e.target.value;
    scheduleSave();
  });
});
['contactEmail','contactPhone','contactLinks'].forEach(id=>{
  document.getElementById(id).addEventListener('input', e=>{
    state[id] = e.target.value;
    scheduleSave();
  });
});

// ===== TABS =====
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    ['work','skills','contact'].forEach(id=>{
      document.getElementById(id).style.display = (id===btn.dataset.target) ? 'block' : 'none';
    });
  });
});

// ===== FILE TO BASE64 =====
function fileToDataUrl(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ===== BOARD RENDER =====
function renderBoard(){
  const board = document.getElementById('board');
  board.innerHTML = '';
  state.projects.forEach(proj=>{
    board.appendChild(renderProjectCard(proj));
  });
  const addCard = document.createElement('button');
  addCard.className = 'add-project-card';
  addCard.textContent = '+ Add project';
  addCard.addEventListener('click', ()=>{
    state.projects.push(defaultProject());
    renderBoard();
    scheduleSave();
  });
  board.appendChild(addCard);
}

function renderProjectCard(proj){
  const card = document.createElement('div');
  card.className = 'pin-card';
  card.style.borderColor = 'var(--ink)';

  const tag = document.createElement('div');
  tag.className = 'accent-tag';
  tag.style.background = ACCENT_HEX[proj.accent];
  tag.textContent = 'Case Study';
  card.appendChild(tag);

  // drop zone
  const dz = document.createElement('div');
  dz.className = 'drop-zone';
  dz.style.borderBottomColor = 'var(--ink)';

  function renderDzContent(){
    dz.innerHTML = '';
    if(proj.cover){
      const img = document.createElement('img');
      img.src = proj.cover;
      dz.appendChild(img);
      const removeBtn = document.createElement('button');
      removeBtn.className = 'dz-remove';
      removeBtn.textContent = '×';
      removeBtn.addEventListener('click', (e)=>{
        e.stopPropagation();
        proj.cover = null;
        renderDzContent();
        scheduleSave();
      });
      dz.appendChild(removeBtn);
    } else {
      const prompt = document.createElement('div');
      prompt.className = 'dz-prompt';
      prompt.innerHTML = '<span class="dz-icon">📌</span><span>Drop cover image<br>or click to upload</span>';
      dz.appendChild(prompt);
    }
  }
  renderDzContent();

  dz.addEventListener('dragover', e=>{ e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', ()=> dz.classList.remove('drag-over'));
  dz.addEventListener('drop', async e=>{
    e.preventDefault();
    dz.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if(file && file.type.startsWith('image/')){
      proj.cover = await fileToDataUrl(file);
      renderDzContent();
      scheduleSave();
    }
  });
  dz.addEventListener('click', ()=>{
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.addEventListener('change', async ()=>{
      if(input.files[0]){
        proj.cover = await fileToDataUrl(input.files[0]);
        renderDzContent();
        scheduleSave();
      }
    });
    input.click();
  });
  card.appendChild(dz);

  // extra thumbnails row
  const thumbRow = document.createElement('div');
  thumbRow.className = 'more-thumbs';
  function renderThumbs(){
    thumbRow.innerHTML = '';
    proj.extraImages.forEach((src, idx)=>{
      const img = document.createElement('img');
      img.src = src;
      img.title = 'Click to remove';
      img.addEventListener('click', ()=>{
        proj.extraImages.splice(idx,1);
        renderThumbs();
        scheduleSave();
      });
      thumbRow.appendChild(img);
    });
    const addThumb = document.createElement('button');
    addThumb.className = 'thumb-add';
    addThumb.textContent = '+';
    addThumb.addEventListener('click', ()=>{
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.multiple = true;
      input.addEventListener('change', async ()=>{
        for(const f of input.files){
          proj.extraImages.push(await fileToDataUrl(f));
        }
        renderThumbs();
        scheduleSave();
      });
      input.click();
    });
    thumbRow.appendChild(addThumb);
  }
  renderThumbs();
  thumbRow.addEventListener('dragover', e=>e.preventDefault());
  thumbRow.addEventListener('drop', async e=>{
    e.preventDefault();
    for(const f of e.dataTransfer.files){
      if(f.type.startsWith('image/')) proj.extraImages.push(await fileToDataUrl(f));
    }
    renderThumbs();
    scheduleSave();
  });
  card.appendChild(thumbRow);

  // body
  const body = document.createElement('div');
  body.className = 'pin-body';

  const titleInput = document.createElement('input');
  titleInput.className = 'title-input';
  titleInput.placeholder = 'Project title';
  titleInput.value = proj.title;
  titleInput.addEventListener('input', e=>{ proj.title = e.target.value; scheduleSave(); });
  body.appendChild(titleInput);

  const taglineInput = document.createElement('input');
  taglineInput.className = 'tagline-input';
  taglineInput.placeholder = 'One-line summary, e.g. Redesigning checkout for a DTC retailer';
  taglineInput.value = proj.tagline;
  taglineInput.addEventListener('input', e=>{ proj.tagline = e.target.value; scheduleSave(); });
  body.appendChild(taglineInput);

  const fields = document.createElement('div');
  fields.className = 'case-fields';
  [
    {key:'problem', label:'Problem', placeholder:'What challenge or user pain point did this project address?'},
    {key:'process', label:'Process', placeholder:'Research, wireframes, testing, iterations — how did you get to the solution?'},
    {key:'solution', label:'Solution & outcome', placeholder:'What did you ship, and what was the impact or result?'}
  ].forEach(f=>{
    const wrap = document.createElement('div');
    wrap.className = 'case-field';
    const label = document.createElement('label');
    label.textContent = f.label;
    wrap.appendChild(label);
    const ta = document.createElement('textarea');
    ta.placeholder = f.placeholder;
    ta.value = proj[f.key];
    ta.rows = 2;
    ta.addEventListener('input', e=>{ proj[f.key] = e.target.value; scheduleSave(); });
    wrap.appendChild(ta);
    fields.appendChild(wrap);
  });
  body.appendChild(fields);

  const tagsRow = document.createElement('div');
  tagsRow.className = 'tags-row';
  function renderTags(){
    tagsRow.innerHTML = '';
    proj.tags.forEach((t, idx)=>{
      const pill = document.createElement('span');
      pill.className = 'tag-pill';
      pill.textContent = t;
      pill.style.cursor = 'pointer';
      pill.title = 'Click to remove';
      pill.addEventListener('click', ()=>{
        proj.tags.splice(idx,1);
        renderTags();
        scheduleSave();
      });
      tagsRow.appendChild(pill);
    });
    const tagInput = document.createElement('input');
    tagInput.className = 'tag-input';
    tagInput.placeholder = '+ tag';
    tagInput.addEventListener('keydown', e=>{
      if(e.key === 'Enter' && e.target.value.trim()){
        proj.tags.push(e.target.value.trim());
        renderTags();
        scheduleSave();
      }
    });
    tagsRow.appendChild(tagInput);
  }
  renderTags();
  body.appendChild(tagsRow);

  const deleteBtn = document.createElement('button');
  deleteBtn.className = 'delete-project';
  deleteBtn.textContent = 'Remove this project';
  deleteBtn.addEventListener('click', ()=>{
    state.projects = state.projects.filter(p=>p.id !== proj.id);
    renderBoard();
    scheduleSave();
  });
  body.appendChild(deleteBtn);

  card.appendChild(body);
  return card;
}

// ===== SKILLS / TOOLS =====
function renderSkillRow(containerId, stateKey){
  const row = document.getElementById(containerId);
  row.innerHTML = '';
  state[stateKey].forEach((skill, idx)=>{
    const pill = document.createElement('span');
    pill.className = 'skill-pill';
    const txt = document.createElement('span');
    txt.textContent = skill;
    pill.appendChild(txt);
    const removeBtn = document.createElement('button');
    removeBtn.textContent = '×';
    removeBtn.addEventListener('click', ()=>{
      state[stateKey].splice(idx,1);
      renderSkillRow(containerId, stateKey);
      scheduleSave();
    });
    pill.appendChild(removeBtn);
    row.appendChild(pill);
  });
  const input = document.createElement('input');
  input.className = 'add-skill-input';
  input.placeholder = '+ add';
  input.addEventListener('keydown', e=>{
    if(e.key === 'Enter' && e.target.value.trim()){
      state[stateKey].push(e.target.value.trim());
      renderSkillRow(containerId, stateKey);
      scheduleSave();
    }
  });
  row.appendChild(input);
}


// ===== EXPORT / RESET =====
function escapeScriptClosingTags(text){
  return text.replace(/<\/script>/gi, '<\\/script>');
}

function downloadFilledHtml(){
  saveState();
  const doc = document.documentElement.outerHTML;
  const stateScript = `<script>localStorage.setItem('noorah-portfolio-data', ${JSON.stringify(JSON.stringify(state))});<\/script>`;
  const filledDoc = '<!DOCTYPE html>\n' + doc.replace('</body>', stateScript + '\n</body>');
  const blob = new Blob([filledDoc], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'Noorah-Ashmeel-Portfolio.html';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

document.getElementById('downloadHtml').addEventListener('click', downloadFilledHtml);
document.getElementById('resetData').addEventListener('click', ()=>{
  if(confirm('Reset all saved portfolio data on this browser?')){
    localStorage.removeItem('noorah-portfolio-data');
    location.reload();
  }
});

loadState();
</script>
